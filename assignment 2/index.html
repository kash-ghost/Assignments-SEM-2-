<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header><h1>Async Weather Tracker</h1></header>
        <div class="page">
            <section class="card">
                <h3>Search City</h3>
                <div class="city_input">
                    <input type="text" id="cityInput" placeholder="Enter city name...">
                    <button id="searchBtn">Search</button>
                </div>
                <div class="history-section">
                    <h3>Recent Searches</h3>
                    <ul id="historyList"></ul>
                </div>
            </section>
            <section class="card">
                <h3>Weather Info</h3>
                <div id="weatherDisplay">
                    <p>Search for a city to see results...</p>
                </div>
            </section>
        </div>
        <section class="card">
            <h3>Event Loop Logs</h3>
            <div id="logOutput" class="logs"></div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
